[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 & PORT=${PORT:-3000} npm start"
